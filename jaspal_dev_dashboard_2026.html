<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaspal Group – Development Plan Dashboard 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;font-size:13px;color:#1a1a1a;background:#f0f2f5}
.header{padding:16px 20px 12px;background:#1f2d40;color:#fff}
.header-title{font-size:20px;font-weight:600;color:#f0b429}
.header-sub{font-size:12px;color:#a0b0c0;margin-top:3px}
.kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:14px 20px;background:#fff;border-bottom:1px solid #e5e7eb}
.kpi{background:#f8f9fb;border-radius:8px;padding:10px 14px;border:1px solid #e5e7eb}
.kpi-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.kpi-val{font-size:24px;font-weight:600;margin-top:2px}
.kpi-sub{font-size:11px;color:#aaa;margin-top:1px}
.filters{display:flex;flex-wrap:wrap;gap:8px;padding:12px 20px;align-items:center;background:#fff;border-bottom:1px solid #e5e7eb}
.filters label{font-size:12px;color:#666;font-weight:500}
.filters select,.filters input{height:32px;font-size:12px;padding:0 10px;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#1a1a1a;outline:none}
.filters select:focus,.filters input:focus{border-color:#1d4ed8}
.reset-btn{height:32px;padding:0 14px;font-size:12px;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#444;cursor:pointer;font-weight:500}
.reset-btn:hover{background:#f3f4f6}
.filter-star{display:flex;align-items:center;gap:5px;height:32px;padding:0 12px;border-radius:6px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-size:12px;color:#555;font-weight:500;user-select:none;transition:all .15s}
.filter-star:hover{background:#fffbeb;border-color:#f59e0b}
.filter-star.active{background:#fffbeb;border-color:#f59e0b;color:#92400e}
.count-info{font-size:11px;color:#999;padding:6px 20px 2px;background:#fff}
.section-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.6px;padding:8px 20px 5px;background:#fff}
.gantt-wrap{overflow-x:auto;padding:0 20px 24px;background:#fff}
table.gantt{border-collapse:collapse;width:max-content;min-width:100%;table-layout:fixed}
.gantt th,.gantt td{border:0.5px solid #e5e7eb;white-space:nowrap;vertical-align:middle}
.gantt thead tr.row-month th{font-size:11px;font-weight:600;text-align:center;padding:6px 0;color:#555;background:#f8f9fb}
.gantt thead tr.row-week th{font-size:10px;font-weight:400;text-align:center;padding:3px 0;color:#888;background:#f8f9fb}
.gantt tbody tr:nth-child(odd) td{background:#fff}
.gantt tbody tr:nth-child(even) td{background:#fafafa}
.gantt tbody tr:hover td{background:#eff6ff!important}
.gantt tbody tr.imp td{background:#fffdf0}
.gantt tbody tr.imp:hover td{background:#fef9e7!important}
.col-no{width:34px;text-align:center;font-size:11px;color:#999;padding:6px 0}
.col-star{width:24px;text-align:center;padding:0 2px}
.col-name{width:248px;padding:6px 8px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#222}
.col-status{width:82px;text-align:center;padding:3px}
.col-q{width:34px;text-align:center;font-size:11px;color:#888;font-weight:600}
.week-cell{width:21px;text-align:center;padding:3px 1px}
.bar{display:inline-block;width:13px;height:13px;border-radius:3px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;color:#fff}
.legend-row{display:flex;flex-wrap:wrap;gap:10px;padding:10px 20px 16px;align-items:center;background:#fff;border-top:1px solid #e5e7eb}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.legend-sep{width:1px;height:14px;background:#e5e7eb;margin:0 2px}
.empty-state{padding:40px 20px;text-align:center;color:#bbb;font-size:13px}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Jaspal Group &nbsp;&middot;&nbsp; Development Plan 2026</div>
  <div class="header-sub">Projects Q1&ndash;Q4 &nbsp;&middot;&nbsp; NOW = APR W2 &nbsp;&middot;&nbsp;
    <span style="color:#fca5a5;font-weight:500">&#9608; Songkran holiday = APR W3</span> &nbsp;&middot;&nbsp;
    <span style="color:#fde68a">&#9733; = Priority project</span>
  </div>
</div>

<div class="kpi-row" id="kpiRow"></div>

<div class="filters">
  <label>Status</label>
  <select id="fStatus"><option value="">All Status</option></select>
  <label>Quarter</label>
  <select id="fQ">
    <option value="">All Quarters</option>
    <option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option>
  </select>
  <label>Search</label>
  <input type="text" id="fSearch" placeholder="Project name..." style="min-width:160px">
  <div class="filter-star" id="fStar" onclick="toggleStar()">
    <span style="font-size:14px;color:#f59e0b">&#9733;</span> Priority only
  </div>
  <button class="reset-btn" onclick="resetFilters()">Reset</button>
</div>

<div class="count-info" id="countInfo"></div>
<div class="section-label">Gantt Chart &mdash; Weekly View</div>
<div class="gantt-wrap" id="ganttWrap"></div>
<div class="legend-row" id="legendRow"></div>

<script>
const SC={
  "Done":"#16a34a","Processing":"#ea580c","SIT":"#ca8a04",
  "Studying":"#d97706","Working":"#0d9488","Develop":"#0891b2",
  "UAT":"#7c3aed","Cancel":"#dc2626"
};

const MONTHS=[
  {name:"JAN",w:4},{name:"FEB",w:4},{name:"MAR",w:4},
  {name:"APR",w:5},{name:"MAY",w:4},{name:"JUN",w:4},
  {name:"JUL",w:4},{name:"AUG",w:4},{name:"SEP",w:4},
  {name:"OCT",w:4},{name:"NOV",w:4},{name:"DEC",w:4}
];

const HOL_M=3,HOL_W=2; // APR W3
const NOW_M=3,NOW_W=1; // APR W2

const PROJECTS=[
  {no:1, name:"The Pooling system-CR2",                      star:false,status:"Done",      q:"Q1",active:[[0,0],[0,1],[0,2],[0,3]]},
  {no:2, name:"The Pooling system Enhancement \u2013 Cr3",  star:false,status:"Processing",q:"Q2",active:[[0,0],[0,1],[2,0],[2,1],[2,2],[2,3],[3,0],[3,1],[3,3],[3,4],[4,0],[4,1],[4,2]]},
  {no:3, name:"Daily Stock reconcile for Maersk in Vietnam", star:false,status:"Done",      q:"Q1",active:[[0,1],[0,2],[0,3],[1,0]]},
  {no:4, name:"Centric All Integration",                     star:false,status:"Done",      q:"Q1",active:[[0,1],[0,2],[0,3]]},
  {no:5, name:"Sales integration for AMLB mall in Vietnam",  star:false,status:"Done",      q:"Q1",active:[[1,3],[2,0]]},
  {no:6, name:"Retail Pro Import customer-data",             star:false,status:"Cancel",    q:"Q1",active:[[0,0],[0,1]]},
  {no:7, name:"DOA Modernize Corporate",                     star:true, status:"SIT",       q:"Q2",active:[[1,0],[1,1],[1,2],[1,3],[2,0],[2,1],[2,2],[2,3],[3,0],[3,1],[3,3],[3,4],[4,0],[4,1],[4,2]]},
  {no:8, name:"Digital Approval (DOA)",                      star:true, status:"Studying",  q:"Q2",active:[[3,0],[3,1],[3,3],[3,4],[4,0],[4,1],[4,2]]},
  {no:9, name:"Status Report by brand for DCM",              star:false,status:"Done",      q:"Q1",active:[[1,3],[2,0]]},
  {no:10,name:"API Gateway Replacement (WSo2)",              star:true, status:"Done",      q:"Q1",active:[[1,0],[1,1],[1,2],[2,0],[2,1],[2,2]]},
  {no:11,name:"Job Title Permission in Time Attendance ORI", star:false,status:"Done",      q:"Q1",active:[[1,2],[1,3],[2,0]]},
  {no:12,name:"Web Chart",                                   star:true, status:"SIT",       q:"Q2",active:[[2,0],[2,1],[2,2],[2,3],[3,0],[3,1],[3,3],[3,4],[4,0],[4,1],[4,2]]},
  {no:13,name:"Target Goods ready date",                     star:false,status:"Working",   q:"Q2",active:[[2,0],[2,1],[2,2],[2,3],[3,0],[3,1],[3,3],[3,4],[4,0],[4,1],[4,2],[4,3]]},
  {no:14,name:"Agentic AI web portal",                       star:true, status:"Develop",   q:"Q2",active:[[2,2],[2,3],[3,0],[3,1],[3,3],[3,4],[4,0],[4,1],[4,2],[4,3]]},
  {no:15,name:"Jbarcode Universal for Malaysia",             star:false,status:"Done",      q:"Q1",active:[[1,0],[1,1],[1,2],[1,3],[2,0],[2,1],[2,2],[3,0]]},
  {no:16,name:"Add new WH (DC-TS) for Shop Allocation",     star:false,status:"UAT",       q:"Q2",active:[[2,0],[2,1],[2,2],[2,3],[3,0],[3,1],[3,3],[3,4]]},
  {no:17,name:"BMWS CR 11 Mapping Item",                     star:false,status:"Develop",   q:"Q2",active:[[2,2],[2,3],[3,0],[3,1],[3,3],[3,4]]},
  {no:18,name:"BMWS CR 12 Approver Level 6",                 star:false,status:"Develop",   q:"Q2",active:[[2,3],[3,0],[3,1],[3,3],[3,4]]},
  {no:19,name:"One Asics Employee sales transaction",        star:false,status:"Processing",q:"Q2",active:[[3,0],[3,1]]},
  {no:20,name:"E-tax invoice Malaysia (Advintex)",           star:false,status:"Processing",q:"Q2",active:[[3,0],[3,1]]}
];

let starOnly=false;

const statuses=[...new Set(PROJECTS.map(p=>p.status))];
const fStatusEl=document.getElementById('fStatus');
statuses.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fStatusEl.appendChild(o);});

function toggleStar(){starOnly=!starOnly;document.getElementById('fStar').classList.toggle('active',starOnly);render();}

function getFiltered(){
  const st=fStatusEl.value,q=document.getElementById('fQ').value,
        sr=document.getElementById('fSearch').value.toLowerCase();
  return PROJECTS.filter(p=>
    (!st||p.status===st)&&(!q||p.q===q)&&
    (!sr||p.name.toLowerCase().includes(sr))&&(!starOnly||p.star)
  );
}

function renderKPI(list){
  const total=PROJECTS.length;
  const done=list.filter(p=>p.status==='Done').length;
  const inprog=list.filter(p=>!['Done','Cancel'].includes(p.status)).length;
  const cancel=list.filter(p=>p.status==='Cancel').length;
  document.getElementById('kpiRow').innerHTML=
    `<div class="kpi"><div class="kpi-label">Total Projects</div><div class="kpi-val">${total}</div><div class="kpi-sub">All 2026</div></div>`+
    `<div class="kpi"><div class="kpi-label">Completed</div><div class="kpi-val" style="color:#16a34a">${done}</div><div class="kpi-sub">${Math.round(done/total*100)}% of total</div></div>`+
    `<div class="kpi"><div class="kpi-label">In Progress</div><div class="kpi-val" style="color:#ea580c">${inprog}</div><div class="kpi-sub">active</div></div>`+
    `<div class="kpi"><div class="kpi-label">Cancelled</div><div class="kpi-val" style="color:#dc2626">${cancel}</div><div class="kpi-sub">excluded</div></div>`;
}

function renderGantt(list){
  if(!list.length){document.getElementById('ganttWrap').innerHTML='<div class="empty-state">No projects match the current filters.</div>';return;}
  let h='<table class="gantt"><thead><tr class="row-month">';
  h+='<th class="col-no" rowspan="2">No</th>';
  h+='<th class="col-star" rowspan="2" title="Priority"></th>';
  h+='<th class="col-name" rowspan="2">Project / Change Request</th>';
  h+='<th class="col-status" rowspan="2">Status</th>';
  h+='<th class="col-q" rowspan="2">Q</th>';
  MONTHS.forEach((m,mi)=>{
    const hol=mi===HOL_M;
    h+=`<th colspan="${m.w}" style="${hol?'background:#fff1f2;color:#991b1b;':''}">${m.name}</th>`;
  });
  h+='</tr><tr class="row-week">';
  MONTHS.forEach((m,mi)=>{
    for(let w=0;w<m.w;w++){
      const isHol=(mi===HOL_M&&w===HOL_W);
      const isNow=(mi===NOW_M&&w===NOW_W);
      if(isHol) h+=`<th style="background:#fca5a5;color:#7f1d1d;font-weight:600;font-size:9px;border-left:2px solid #dc2626;border-right:2px solid #dc2626" title="Songkran">W${w+1}</th>`;
      else if(isNow) h+=`<th style="background:#1d4ed8;color:#fff;font-weight:600;font-size:10px;border-left:2px solid #1d4ed8;border-right:2px solid #1d4ed8">NOW</th>`;
      else h+=`<th>W${w+1}</th>`;
    }
  });
  h+='</tr></thead><tbody>';
  list.forEach(p=>{
    const aSet=new Set(p.active.map(([m,w])=>`${m}-${w}`));
    h+=`<tr class="${p.star?'imp':''}">
      <td class="col-no">${p.no}</td>
      <td class="col-star"><span style="font-size:13px;color:${p.star?'#f59e0b':'#e5e7eb'}" title="${p.star?'Priority project':''}">${p.star?'&#9733;':'&#9733;'}</span></td>
      <td class="col-name" title="${p.name}">${p.name}</td>
      <td class="col-status"><span class="badge" style="background:${SC[p.status]}">${p.status}</span></td>
      <td class="col-q">${p.q}</td>`;
    MONTHS.forEach((m,mi)=>{
      for(let w=0;w<m.w;w++){
        const hasBar=aSet.has(`${mi}-${w}`);
        const isHol=(mi===HOL_M&&w===HOL_W);
        const isNow=(mi===NOW_M&&w===NOW_W);
        let cs='';
        if(isHol) cs='background:rgba(252,165,165,0.25);border-left:2px solid #dc2626;border-right:2px solid #dc2626;';
        if(isNow) cs='border-left:2px solid #1d4ed8;border-right:2px solid #1d4ed8;';
        h+=`<td class="week-cell" style="${cs}">${hasBar?`<span class="bar" style="background:${SC[p.status]};opacity:${isHol?0.35:1}"></span>`:''}`;
        h+='</td>';
      }
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('ganttWrap').innerHTML=h;
}

function renderLegend(){
  let h='';
  Object.entries(SC).forEach(([s,c])=>{h+=`<span class="legend-item"><span class="legend-dot" style="background:${c}"></span>${s}</span>`;});
  h+=`<span class="legend-sep"></span>`;
  h+=`<span class="legend-item"><span class="legend-dot" style="background:#fca5a5;border:1px solid #dc2626"></span>Songkran holiday (APR W3)</span>`;
  h+=`<span class="legend-item"><span class="legend-dot" style="background:#1d4ed8"></span>NOW &mdash; APR W2</span>`;
  h+=`<span class="legend-sep"></span>`;
  h+=`<span class="legend-item"><span style="color:#f59e0b;font-size:14px;line-height:1">&#9733;</span>&nbsp;Priority project</span>`;
  document.getElementById('legendRow').innerHTML=h;
}

function render(){
  const list=getFiltered();
  document.getElementById('countInfo').textContent=`Showing ${list.length} of ${PROJECTS.length} projects`;
  renderKPI(list);renderGantt(list);
}
function resetFilters(){
  fStatusEl.value='';document.getElementById('fQ').value='';
  document.getElementById('fSearch').value='';
  starOnly=false;document.getElementById('fStar').classList.remove('active');
  render();
}
['fStatus','fQ'].forEach(id=>document.getElementById(id).addEventListener('change',render));
document.getElementById('fSearch').addEventListener('input',render);
renderLegend();render();
</script>
</body>
</html>
